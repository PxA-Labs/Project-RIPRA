name: CI

on: [push, pull_request, workflow_dispatch]

jobs:

  # ─── Linux build + test ─────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rippra

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libomp-dev

      - name: Compile C library
        run: |
          mkdir -p build
          gcc -O2 -fopenmp -c src/io.c -o build/io.o -Iinclude
          gcc -O2 -fopenmp -c src/la.c -o build/la.o -Iinclude
          gcc -O2 -fopenmp -c src/centroid.c -o build/centroid.o -Iinclude
          gcc -O2 -fopenmp -c src/recon.c -o build/recon.o -Iinclude
          gcc -O2 -fopenmp -c src/rippra_api.c -o build/rippra_api.o -Iinclude
          ar rcs build/librippra.a build/io.o build/la.o build/centroid.o build/recon.o build/rippra_api.o

      - name: Build tests
        run: |
          gcc -O2 -fopenmp tests/test_full_pipeline.c build/io.o build/la.o build/centroid.o build/recon.o build/rippra_api.o -Iinclude -lm -o build/test_full_pipeline
          gcc -O2 -fopenmp tests/test_recon.c build/io.o build/la.o build/centroid.o build/recon.o build/rippra_api.o -Iinclude -lm -o build/test_recon

      - name: Generate synthetic test data
        run: |
          pip install --quiet numpy
          python -c "
import numpy as np, os, math, sys
sys.path.insert(0, 'ml')
from synthetic_shwfs import generate_test_data
CFG = {'camera_pixsize':7.4e-6,'frame_width':648,'frame_height':492,
       'pitch':300e-6,'flength':18e-3,'pupil_radius':2e-3,
       'sa_radius':150e-6,'zernike_nmax':5,
       'thresh_binary':0.08,'centroid_percent':0.2}
r = generate_test_data('data_raw', CFG)
print(f'Generated {r[\"nspots\"]} spots, |dx|max={abs(r[\"dx\"]).max():.2f} px')
"

      - name: Run integration tests
        run: |
          ./build/test_full_pipeline
          ./build/test_recon

      - name: Test evaluate_inference (skip gracefully if artifacts missing)
        run: |
          pip install --quiet numpy pandas scipy
          python -c "
import os
base = 'ml_checkpoints/local'
if os.path.exists(base + '/best_mlp.pt') and os.path.exists('data_ai/dataset.npz'):
    print('ML artifacts found — would run evaluate_inference.py')
    # TODO: add evaluate_inference.py call once CI generates checkpoints
else:
    print('SKIP: ML artifacts not found')
"

  # ─── Windows (MinGW) build + test ──────────────────────
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: rippra

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: choco install mingw --version=13.2.0 -y --no-progress

      - name: Compile C library
        run: |
          if (-not (Test-Path -LiteralPath "build")) { mkdir build }
          gcc -O2 -c src/io.c -o build/io.o -Iinclude
          gcc -O2 -c src/la.c -o build/la.o -Iinclude
          gcc -O2 -c src/centroid.c -o build/centroid.o -Iinclude
          gcc -O2 -c src/recon.c -o build/recon.o -Iinclude
          gcc -O2 -c src/rippra_api.c -o build/rippra_api.o -Iinclude
          ar rcs build/librippra.a build/io.o build/la.o build/centroid.o build/recon.o build/rippra_api.o

      - name: Build tests
        run: |
          if (-not (Test-Path -LiteralPath "build")) { mkdir build }
          gcc -O2 tests/test_full_pipeline.c build/io.o build/la.o build/centroid.o build/recon.o build/rippra_api.o -Iinclude -lm -o build/test_full_pipeline.exe
          gcc -O2 tests/test_recon.c build/io.o build/la.o build/centroid.o build/recon.o build/rippra_api.o -Iinclude -lm -o build/test_recon.exe

      - name: Generate synthetic test data
        run: |
          pip install --quiet numpy
          python -c "
import numpy as np, os, sys
sys.path.insert(0, 'ml')
from synthetic_shwfs import generate_test_data
CFG = {'camera_pixsize':7.4e-6,'frame_width':648,'frame_height':492,
       'pitch':300e-6,'flength':18e-3,'pupil_radius':2e-3,
       'sa_radius':150e-6,'zernike_nmax':5,
       'thresh_binary':0.08,'centroid_percent':0.2}
r = generate_test_data('data_raw', CFG)
print(f'Generated {r[\"nspots\"]} spots, |dx|max={abs(r[\"dx\"]).max():.2f} px')
"

      - name: Run integration tests
        run: |
          .\build\test_full_pipeline.exe
          .\build\test_recon.exe

  # ─── Python ML + ONNX tests ───────────────────────────
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rippra

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: |
          pip install --quiet numpy matplotlib scipy onnx onnxruntime pandas

      - name: Test ONNX model loading
        run: python ml/test_onnx_models.py

      - name: Run predictive AO simulation (skips torch if unavailable)
        run: python ml/predictive_ao.py
